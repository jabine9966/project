# ============================================================
# GitHub Actions: Binance SOL 永续合约数据自动下载
# ============================================================
# 触发方式：
#   1. 定时触发：每天北京时间 02:00 (UTC 前一天 18:00)
#   2. 手动触发：通过 GitHub 网页 "Run workflow" 按钮
# 执行流程：
#   checkout -> 安装 Python 依赖 -> 运行 fetch_data.py ->
#   将新生成的数据提交并推送回仓库
# ============================================================

name: Fetch Binance SOL Data

on:
  # 手动触发（支持在 GitHub 网页点击运行）
  workflow_dispatch:

  # 定时触发：UTC 18:00 = 北京时间次日 02:00
  # 每日凌晨执行，确保数据完整且避开交易高峰
  schedule:
    - cron: '0 18 * * *'

# 赋予写入权限，用于将数据推送回仓库
permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    # 设置时区为北京时间，脚本中的 datetime.now() 将按北京时间计算
    env:
      TZ: Asia/Shanghai

    steps:
      # --------------------------------------------------------
      # 1. 检出代码
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 需要 fetch-depth=0 才能正常 push 回仓库
          fetch-depth: 0
          # 使用 GITHUB_TOKEN 进行认证
          token: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # 2. 设置 Python 环境
      # --------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --------------------------------------------------------
      # 3. 安装依赖
      # --------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas numpy

      # --------------------------------------------------------
      # 4. 运行数据下载脚本
      # --------------------------------------------------------
      - name: Run fetch_data.py
        run: python fetch_data.py

      # --------------------------------------------------------
      # 5. 提交并推送数据更新
      # --------------------------------------------------------
      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 添加 DATA 目录下所有变更（含新增/修改/删除）
          git add DATA/

          # 获取当前北京时间用于提交信息
          RUN_TIME=$(date +"%Y-%m-%d %H:%M")

          # 仅当存在 staged 变更时才提交，避免空提交导致报错
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore: auto-update SOL data [${RUN_TIME} 北京时间]"
            git push origin main
            echo "数据已推送: ${RUN_TIME}"
          fi

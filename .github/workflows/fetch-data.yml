name: Fetch OKX SOL Data

on:
  schedule:
    # GitHub Actions cron 使用 UTC 时间
    # Asia/Shanghai 09:00 → UTC 01:00
    # Asia/Shanghai 21:00 → UTC 13:00
    - cron: "0 1 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write           # 允许向仓库 push commit

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch OKX SOL-USDT-SWAP 15d data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Shanghai     # 让日志显示北京时间

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show schedule context
        run: |
          echo "UTC now:      $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Shanghai now: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          echo "Triggered by: ${{ github.event_name }}"

      - name: Run fetch_data.py
        run: python scripts/fetch_data.py

      - name: Commit & push data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 只追踪 data/ 目录的变化
          git add data/

          if git diff --cached --quiet; then
            echo "✅ No data changes to commit."
            exit 0
          fi

          SH_TS=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M %Z')
          git commit -m "chore(data): auto refresh @ ${SH_TS}"

          # 推送前 rebase，避免与 analyze-report 工作流的提交冲突
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Upload data snapshot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-snapshot-${{ github.run_id }}
          path: data/
          retention-days: 14

name: Analyze & Generate Report

on:
  schedule:
    # Asia/Shanghai (UTC+8) 09:30 → UTC 01:30
    # Asia/Shanghai (UTC+8) 21:30 → UTC 13:30
    - cron: "30 1 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write

concurrency:
  group: analyze-report
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze data & write REPORT.md
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repo (拉取最新数据)
        uses: actions/checkout@v4
        with:
          # 保证拿到 fetch-data 工作流 30 分钟前刚 push 的最新 data/
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show schedule context
        run: |
          echo "UTC now:      $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Shanghai now: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"

      - name: Sanity check - data/ must exist
        run: |
          if [ ! -f data/ohlcv_1h.csv ]; then
            echo "❌ data/ohlcv_1h.csv 不存在。请先运行 fetch-data.yml。"
            exit 1
          fi
          echo "✅ data/ 已就绪。"
          ls -la data/

      - name: Run analyze_report.py
        run: python scripts/analyze_report.py

      - name: Commit & push report updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 只追踪报告类文件的变化
          git add REPORT.md analysis.json

          if git diff --cached --quiet; then
            echo "✅ No report changes to commit."
            exit 0
          fi

          SH_TS=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M %Z')
          git commit -m "docs(report): auto regenerate @ ${SH_TS}"

          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Upload report as artifact (备份)
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_id }}
          path: |
            REPORT.md
            analysis.json
          retention-days: 30
